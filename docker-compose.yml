name: ${COMPOSE_PROJECT_NAME:-bray-scenarios}

services:
  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roleplay_app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roleplay_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/roleplay_app
      PORT: 3001
      MEDIA_DIR: /app/data/media
    volumes:
      - saml_certs:/app/data/saml
      - ./server/data/media:/app/data/media

volumes:
  pgdata:
  saml_certs:
