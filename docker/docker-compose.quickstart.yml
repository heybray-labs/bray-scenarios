services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roleplay_app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roleplay_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/heybray-labs/bray-scenarios:${BRAY_IMAGE_TAG:-latest}
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/roleplay_app
      PORT: 3001
    volumes:
      - saml_certs:/app/data/saml

volumes:
  pgdata:
  saml_certs:
